name: GitHub 3D Contribution

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Embed raw graph into macOS terminal window frame
        run: |
          # Extract inner <g> content from the raw 3D SVG (skip outer root)
          RAW_CONTENT=$(sed -n '/<g transform/,/<\/svg>/p' profile-3d-contrib/profile-night-rainbow.svg | sed 's/&/\\&/g')

          # Build self-contained SVG with terminal window chrome
          cat > profile-3d-contrib/profile-night-rainbow.svg << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 820" font-family="ui-monospace,'SF Mono',Menlo,'Cascadia Mono',Consolas,monospace">
            <rect x="1" y="1" width="878" height="818" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
            <circle cx="26" cy="22" r="6" fill="#ff5f57"/>
            <circle cx="48" cy="22" r="6" fill="#febc2e"/>
            <circle cx="70" cy="22" r="6" fill="#28c840"/>
            <text x="440" y="26" text-anchor="middle" font-size="12" fill="#8b949e">zephyr110@orbit — ~/contributions</text>
            <line x1="1" y1="42" x2="879" y2="42" stroke="#21262d" stroke-width="1"/>
            <g transform="translate(20,55) scale(0.65625)">
          SVGEOF

          echo "$RAW_CONTENT" >> profile-3d-contrib/profile-night-rainbow.svg

          echo '  </g></svg>' >> profile-3d-contrib/profile-night-rainbow.svg
          echo "Self-contained SVG generated ($(wc -c < profile-3d-contrib/profile-night-rainbow.svg) bytes)"

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: profile-3d
          build_dir: profile-3d-contrib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
